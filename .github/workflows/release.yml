name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.11'

jobs:
  # -----------------------------------------------------------------------
  # Windows – produces a standalone .exe
  # -----------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows .exe with PyInstaller
        run: |
          pyinstaller --onefile --noconsole --noconfirm --clean `
            --collect-all customtkinter `
            --add-data "channelslists;channelslists" `
            getTelegram.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/getTelegram.exe

  # -----------------------------------------------------------------------
  # Linux – produces a .deb package containing a standalone binary
  # -----------------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk dpkg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Linux binary with PyInstaller
        run: |
          pyinstaller --onefile --noconfirm --clean \
            --collect-all customtkinter \
            --add-data "channelslists:channelslists" \
            getTelegram.py

      - name: Determine package version
        id: pkg_version
        run: |
          REF="${{ github.ref_name }}"
          if [[ "$REF" == v* ]]; then
            VERSION="${REF#v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Package as .deb
        run: |
          VERSION="${{ steps.pkg_version.outputs.version }}"
          PKG_DIR="getTelegram_${VERSION}_amd64"

          mkdir -p "${PKG_DIR}/DEBIAN"
          mkdir -p "${PKG_DIR}/opt/TelegramOSINTPolo/channelslists"
          mkdir -p "${PKG_DIR}/usr/local/bin"

          cp dist/getTelegram "${PKG_DIR}/opt/TelegramOSINTPolo/getTelegram"
          chmod +x "${PKG_DIR}/opt/TelegramOSINTPolo/getTelegram"

          # Launcher wrapper so the binary is on PATH
          printf '#!/bin/sh\nexec /opt/TelegramOSINTPolo/getTelegram "$@"\n' \
            > "${PKG_DIR}/usr/local/bin/getTelegram"
          chmod +x "${PKG_DIR}/usr/local/bin/getTelegram"

          printf 'Package: telegramosintpolo\nVersion: %s\nSection: utils\nPriority: optional\nArchitecture: amd64\nMaintainer: Ironship\nDescription: Telegram OSINT Tool\n A GUI tool for scraping and analyzing Telegram channel posts.\n' \
            "${VERSION}" > "${PKG_DIR}/DEBIAN/control"

          dpkg-deb --build "${PKG_DIR}" "getTelegram-${VERSION}-amd64.deb"
        shell: bash

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: getTelegram-*-amd64.deb

  # -----------------------------------------------------------------------
  # Release – attaches both artifacts to a GitHub Release on version tags
  # -----------------------------------------------------------------------
  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4.1.8
        with:
          name: windows-exe
          path: release-assets

      - name: Download Linux artifact
        uses: actions/download-artifact@v4.1.8
        with:
          name: linux-deb
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
